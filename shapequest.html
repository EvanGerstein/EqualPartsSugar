<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShapeQuest</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { margin:0;padding:0;box-sizing:border-box; }
:root { --bg:#f5f4f0;--ink:#1c1c1a;--soft:#b8b5ae;--line:#e2e0db; }
html,body { height:100%;width:100%;background:var(--bg);color:var(--ink);font-family:'DM Mono',monospace;overflow:hidden; }

.wordmark { position:fixed;top:28px;left:32px;font-family:'Instrument Serif',serif;font-size:.95rem;color:var(--ink);letter-spacing:-.2px;z-index:50; }
.wordmark em { font-style:italic;color:var(--soft); }
nav { position:fixed;top:28px;right:32px;display:flex;gap:24px;z-index:50; }
nav a { font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--soft);text-decoration:none;cursor:pointer;transition:color .15s; }
nav a:hover,nav a.on { color:var(--ink); }

.corner-stat { position:fixed;bottom:32px;left:32px;z-index:10; }
.corner-coins { position:fixed;bottom:32px;right:32px;z-index:10;text-align:right; }
.corner-stat .lbl,.corner-coins .lbl { font-size:.52rem;letter-spacing:2px;text-transform:uppercase;color:var(--soft);margin-bottom:4px; }
.corner-stat .val,.corner-coins .val { font-family:'Instrument Serif',serif;font-size:1.4rem;color:var(--ink);line-height:1; }
.xp-track { width:52px;height:2px;background:var(--line);margin-top:6px;border-radius:2px;overflow:hidden; }
.xp-fill { height:100%;width:62%;background:var(--ink);border-radius:2px; }

.stage { width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .25s; }
.shape-wrap { position:relative;display:flex;align-items:center;justify-content:center;width:240px;height:240px; }
.bg-glow { position:absolute;inset:-40px;border-radius:50%;opacity:0;transition:all .6s ease;pointer-events:none;z-index:0; }
#shapeSvg { position:relative;z-index:1;overflow:visible; }

.shape-label { margin-top:36px;text-align:center; }
.shape-rarity { font-size:.56rem;letter-spacing:3px;text-transform:uppercase;color:var(--soft);margin-bottom:10px; }
.shape-name { font-family:'Instrument Serif',serif;font-size:1.9rem;letter-spacing:-.5px;line-height:1; }
.effect-word { transition:color .3s; }
.shape-word { color:var(--ink); }
.shape-pts { font-size:.62rem;color:var(--soft);margin-top:8px;letter-spacing:.8px; }

.cast { margin-top:52px;display:flex;flex-direction:column;align-items:center;gap:10px; }
.cast-btn { width:50px;height:50px;border-radius:50%;background:var(--ink);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(0,0,0,.13);transition:transform .15s,box-shadow .15s,opacity .3s; }
.cast-btn:hover { transform:scale(1.08);box-shadow:0 8px 26px rgba(0,0,0,.2); }
.cast-btn:active { transform:scale(.92); }
.cast-lbl { font-size:.52rem;letter-spacing:2px;text-transform:uppercase;color:var(--soft); }

@keyframes pop { from{opacity:0;transform:scale(.4) translateY(16px)} to{opacity:1;transform:scale(1) translateY(0)} }
.popped { animation:pop .55s cubic-bezier(.17,.67,.3,1.35) both; }
@keyframes bgpulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.2)} }

.flash { position:fixed;inset:0;z-index:200;background:transparent;opacity:0;pointer-events:none;transition:opacity .05s; }
.flash.on { opacity:1; }
.flash.gold { background:linear-gradient(135deg,#fff8e0,#fff0a0); }
.flash.spectral { background:linear-gradient(135deg,#f0e0ff,#e0f0ff); }
.flash.void-flash { background:rgba(20,10,40,.6); }

#vfx { position:fixed;inset:0;z-index:100;pointer-events:none; }

/* ── CATALOGUE ── */
#catalogue {
  position:fixed;inset:0;z-index:15;
  background:var(--bg);
  display:none;flex-direction:column;
  opacity:0;transition:opacity .25s;
}
#catalogue.visible { display:flex; }
#catalogue.active { opacity:1; }
.cat-header {
  padding:28px 32px 0;
  display:flex;align-items:baseline;justify-content:space-between;
  flex-shrink:0;
}
.cat-title { font-family:'Instrument Serif',serif;font-size:1.1rem;color:var(--ink); }
.cat-count { font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--soft); }
.cat-grid-wrap { flex:1;overflow-y:auto;padding:24px 32px 40px; }
.cat-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:10px; }
.cat-section {
  grid-column:1/-1;font-size:.55rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--soft);padding:12px 0 4px;border-top:1px solid var(--line);margin-top:4px;
}
.cat-section:first-child { border-top:none;margin-top:0; }
.cat-card {
  position:relative;background:#fff;border:1px solid var(--line);border-radius:10px;
  padding:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:border-color .15s,transform .12s;aspect-ratio:1;
}
.cat-card:hover { border-color:#aaa;transform:scale(1.04); }
.cat-card svg { overflow:visible; }
.cat-card .count-badge {
  position:absolute;bottom:5px;right:7px;
  font-family:'DM Mono',monospace;font-size:.55rem;color:var(--soft);
}

/* ── DETAIL MODAL ── */
#detail {
  position:fixed;inset:0;z-index:400;
  display:flex;align-items:center;justify-content:center;
  background:rgba(245,244,240,.88);backdrop-filter:blur(8px);
  opacity:0;pointer-events:none;transition:opacity .2s;
}
#detail.active { opacity:1;pointer-events:all; }
.detail-card {
  background:#fff;border:1px solid var(--line);border-radius:16px;
  padding:36px 40px;text-align:center;min-width:260px;max-width:320px;
  box-shadow:0 12px 48px rgba(0,0,0,.1);
  transform:scale(.88);transition:transform .25s cubic-bezier(.17,.67,.3,1.2);
}
#detail.active .detail-card { transform:scale(1); }
.detail-rarity { font-size:.68rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:14px;font-weight:500; }
.detail-svg-wrap { display:flex;justify-content:center;margin:4px 0 16px; }
.detail-name { font-family:'Instrument Serif',serif;font-size:1.7rem;letter-spacing:-.3px;line-height:1; }
.detail-stats { display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:18px 0; }
.detail-stat { border:1px solid var(--line);border-radius:8px;padding:8px 4px; }
.detail-stat-val { font-family:'DM Mono',monospace;font-size:.9rem;color:var(--ink); }
.detail-stat-lbl { font-size:.52rem;color:var(--soft);text-transform:uppercase;letter-spacing:.8px;margin-top:2px; }
.detail-close {
  margin-top:16px;font-size:.6rem;letter-spacing:2px;text-transform:uppercase;
  color:var(--soft);cursor:pointer;transition:color .15s;background:none;border:none;font-family:'DM Mono',monospace;
}
.detail-close:hover { color:var(--ink); }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--line);border-radius:2px; }

/* ── LEADERBOARD ── */
#ranks {
  position:fixed;inset:0;z-index:15;background:var(--bg);
  display:none;flex-direction:column;opacity:0;transition:opacity .25s;
}
#ranks.active { opacity:1; }
.ranks-header { padding:28px 32px 0;flex-shrink:0; }
.ranks-title { font-family:'Instrument Serif',serif;font-size:1.1rem;color:var(--ink);margin-bottom:16px; }
.ranks-tabs { display:flex;gap:0;border:1px solid var(--line);border-radius:8px;overflow:hidden;width:fit-content; }
.ranks-tab { padding:7px 18px;font-size:.65rem;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;color:var(--soft);transition:all .15s;border-right:1px solid var(--line); }
.ranks-tab:last-child { border-right:none; }
.ranks-tab.on { background:var(--ink);color:#f5f4f0; }
.ranks-body { flex:1;overflow-y:auto;padding:20px 32px 40px; }

/* profile setup banner */
.profile-setup {
  background:#fff;border:1px solid var(--line);border-radius:10px;
  padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:12px;
}
.profile-setup input {
  flex:1;border:1px solid var(--line);border-radius:6px;
  padding:7px 11px;font-family:'DM Mono',monospace;font-size:.72rem;
  background:var(--bg);color:var(--ink);outline:none;
}
.profile-setup input:focus { border-color:#aaa; }
.profile-setup button {
  background:var(--ink);color:#f5f4f0;border:none;border-radius:6px;
  padding:7px 14px;font-family:'DM Mono',monospace;font-size:.65rem;
  letter-spacing:1px;cursor:pointer;white-space:nowrap;
}
.profile-lbl { font-size:.6rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--soft);white-space:nowrap; }

/* lb rows */
.lb-row {
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:8px;margin-bottom:4px;
  border:1px solid transparent;transition:border-color .15s;
}
.lb-row:hover { border-color:var(--line); }
.lb-row.me { background:#fff;border-color:var(--ink); }
.lb-pos { font-family:'DM Mono',monospace;font-size:.7rem;color:var(--soft);min-width:22px;text-align:center; }
.lb-pos.gold { color:#c8a020; }
.lb-pos.silver { color:#909090; }
.lb-pos.bronze { color:#b06030; }
.lb-av { width:28px;height:28px;border-radius:50%;background:var(--line);display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:500;flex-shrink:0;color:var(--ink); }
.lb-info { flex:1;min-width:0; }
.lb-name { font-size:.78rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.lb-sub { font-size:.6rem;color:var(--soft); }
.lb-score { font-family:'DM Mono',monospace;font-size:.72rem;color:var(--soft);text-align:right;white-space:nowrap; }
.lb-score span { color:var(--ink); }

/* school search */
.school-search-wrap { margin-bottom:18px; }
.school-search-wrap input {
  width:100%;border:1px solid var(--line);border-radius:8px;
  padding:9px 14px;font-family:'DM Mono',monospace;font-size:.75rem;
  background:#fff;color:var(--ink);outline:none;
}
.school-search-wrap input:focus { border-color:#aaa; }
.school-results { margin-top:6px;display:flex;flex-direction:column;gap:4px; }
.school-result {
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 14px;border:1px solid var(--line);border-radius:8px;
  background:#fff;cursor:pointer;transition:border-color .15s;
}
.school-result:hover { border-color:#aaa; }
.school-result-name { font-size:.78rem;font-weight:500; }
.school-result-meta { font-size:.6rem;color:var(--soft); }
.school-result-join {
  font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:1px;
  text-transform:uppercase;color:var(--soft);border:1px solid var(--line);
  border-radius:4px;padding:3px 9px;background:none;cursor:pointer;
  transition:all .15s;
}
.school-result-join:hover,.school-result-join.joined { background:var(--ink);color:#f5f4f0;border-color:var(--ink); }

.school-banner {
  display:flex;align-items:center;justify-content:space-between;
  background:#fff;border:1px solid var(--line);border-radius:10px;
  padding:12px 16px;margin-bottom:18px;
}
.school-banner-name { font-size:.88rem;font-weight:500; }
.school-banner-rank { font-size:.62rem;color:var(--soft);margin-top:2px; }
.school-leave { font-family:'DM Mono',monospace;font-size:.58rem;color:var(--soft);cursor:pointer;border:none;background:none;letter-spacing:1px;text-transform:uppercase; }
.school-leave:hover { color:var(--ink); }

.lb-section-label { font-family:'DM Mono',monospace;font-size:.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--soft);margin:16px 0 8px;padding-bottom:6px;border-bottom:1px solid var(--line); }
.lb-empty { text-align:center;color:var(--soft);font-size:.72rem;padding:40px 0;line-height:2; }

/* ── CUTSCENE ── */
#cutscene {
  position:fixed;inset:0;z-index:300;
  display:flex;align-items:center;justify-content:center;
  opacity:0;pointer-events:none;
  transition:opacity .4s;
}
#cutscene.active { opacity:1;pointer-events:all; }
#cutscene canvas { position:absolute;inset:0;width:100%;height:100%; }
.cutscene-text {
  position:relative;z-index:2;text-align:center;
  font-family:'Instrument Serif',serif;
  opacity:0;transform:scale(.7);
  transition:opacity .5s,transform .5s;
}
#cutscene.active .cutscene-text { opacity:1;transform:scale(1); }
.cutscene-title { font-size:3rem;letter-spacing:-.5px;line-height:1;color:white;text-shadow:0 0 40px rgba(255,255,255,.8); }
.cutscene-sub { font-size:.8rem;letter-spacing:3px;text-transform:uppercase;margin-top:10px;opacity:.7; }
</style>
</head>
<body>

<div class="wordmark">Shape<em>Quest</em></div>
<nav>
  <a class="on" onclick="showPage('collect')">Collect</a>
  <a onclick="showPage('catalogue')">Catalogue</a>
  <a onclick="showPage('ranks')">Ranks</a>
</nav>
<div class="corner-stat"><div class="lbl">Level</div><div class="val">12</div><div class="xp-track"><div class="xp-fill"></div></div></div>
<div class="corner-coins"><div class="lbl">Coins</div><div class="val" id="coins">4,820</div></div>

<div class="flash" id="flash"></div>
<canvas id="vfx"></canvas>

<!-- Cutscene overlay -->
<div id="cutscene">
  <canvas id="csCanvas"></canvas>
  <div class="cutscene-text">
    <div class="cutscene-title" id="csTitle"></div>
    <div class="cutscene-sub" id="csSub"></div>
  </div>
</div>

<!-- Ranks -->
<div id="ranks">
  <div class="ranks-header">
    <div class="ranks-title">Leaderboards</div>
    <div class="ranks-tabs">
      <div class="ranks-tab on" onclick="switchRanksTab('global')">Global</div>
      <div class="ranks-tab" onclick="switchRanksTab('school')">School</div>
    </div>
  </div>
  <div class="ranks-body" id="ranksBody"></div>
</div>

<!-- Catalogue -->
<div id="catalogue">
  <div class="cat-header">
    <div class="cat-title">Catalogue</div>
    <div class="cat-count" id="catCount">0 shapes</div>
  </div>
  <div class="cat-grid-wrap">
    <div class="cat-grid" id="catGrid"></div>
  </div>
</div>

<!-- Detail modal -->
<div id="detail" onclick="closeDetail(event)">
  <div class="detail-card">
    <div class="detail-rarity" id="detailRarity"></div>
    <div class="detail-svg-wrap"><svg id="detailSvg" width="110" height="110" viewBox="-20 -20 180 180" overflow="visible"></svg></div>
    <div class="detail-name">
      <span id="detailEffect"></span><span id="detailShape" style="color:var(--ink)"></span>
    </div>
    <div class="detail-stats">
      <div class="detail-stat"><div class="detail-stat-val" id="detailPts"></div><div class="detail-stat-lbl">Best pts</div></div>
      <div class="detail-stat"><div class="detail-stat-val" id="detailCount"></div><div class="detail-stat-lbl">Rolled</div></div>
      <div class="detail-stat"><div class="detail-stat-val" id="detailOdds"></div><div class="detail-stat-lbl">Chance</div></div>
    </div>
    <button class="detail-close" onclick="closeDetail()">close</button>
  </div>
</div>

<div class="stage">
  <div class="shape-wrap">
    <div class="bg-glow" id="bgGlow"></div>
    <svg id="shapeSvg" width="160" height="160" viewBox="-20 -20 180 180"></svg>
  </div>
  <div class="shape-label" id="shapeLabel">
    <div class="shape-rarity" id="rarityTag">✦ Epic</div>
    <div class="shape-name">
      <span class="effect-word" id="sizeWord" style="display:none"></span><span class="effect-word" id="effectWord" style="color:#a888c0">Glow</span>
      <span class="shape-word" id="shapeWord"> Sphere</span>
    </div>
    <div class="shape-pts" id="shapePts">+320 pts · +240 xp</div>
  </div>
  <div class="cast">
    <button class="cast-btn" id="castBtn" onclick="docast()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
    </button>
    <div class="cast-lbl" id="castLbl">Roll</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════
const SHAPES = [
  { id:'sphere',    label:'Sphere',    sides:0,  w:50 },
  { id:'triangle',  label:'Triangle',  sides:3,  w:22 },
  { id:'square',    label:'Square',    sides:4,  w:18 },
  { id:'pentagon',  label:'Pentagon',  sides:5,  w:12 },
  { id:'hexagon',   label:'Hexagon',   sides:6,  w:8  },
  { id:'octagon',   label:'Octagon',   sides:8,  w:5  },
  { id:'star',      label:'Star',      sides:12, w:3  },
  { id:'diamond',   label:'Diamond',   sides:4,  w:10 },
  { id:'cross',     label:'Cross',     sides:0,  w:4  },
  { id:'arrow',     label:'Arrow',     sides:0,  w:3  },
  { id:'starburst', label:'Starburst', sides:16, w:2  },
  // ── 5 new shapes ──
  { id:'teardrop',  label:'Teardrop',  sides:0,  w:6  },
  { id:'heptagon',  label:'Heptagon',  sides:7,  w:4  },
  { id:'crescent',  label:'Crescent',  sides:0,  w:3  },
  { id:'gem',       label:'Gem',       sides:0,  w:2  },
  { id:'ring',      label:'Ring',      sides:0,  w:1  },
];

// vfx tiers: 0=none 1=dust 2=ring+sparks 3=beams+shards 4=storm 5=insane 6=CUTSCENE
const EFFECTS = [
  { id:null,        label:null,        color:'#999',    fill:'#cccccc', vfx:0, w:700 },
  { id:'Shadow',    label:'Shadow',    color:'#777',    fill:'#3a3a3a', vfx:1, w:80  },
  { id:'Rust',      label:'Rust',      color:'#a05030', fill:'#b86040', vfx:1, w:65  },
  { id:'Stone',     label:'Stone',     color:'#888070', fill:'#a09880', vfx:1, w:55  },
  { id:'Glow',      label:'Glow',      color:'#7dbfa8', fill:'#9ad4bf', vfx:2, w:35  },
  { id:'Frozen',    label:'Frozen',    color:'#60b0d8', fill:'#90d0f0', vfx:2, w:28  },
  { id:'Toxic',     label:'Toxic',     color:'#70c040', fill:'#90e040', vfx:2, w:22  },
  { id:'Prism',     label:'Prism',     color:'#7898c8', fill:'#a0b8d8', vfx:2, w:18  },
  { id:'Crystal',   label:'Crystal',   color:'#80d0e8', fill:'#b0eeff', vfx:2, w:26  },
  { id:'Storm',     label:'Storm',     color:'#8090b0', fill:'#6070a0', vfx:2, w:20  },
  { id:'Ember',     label:'Ember',     color:'#d07030', fill:'#e08840', vfx:2, w:16  },
  { id:'Aurora',    label:'Aurora',    color:'#60c8a0', fill:'#40e890', vfx:2, w:12  },
  { id:'Void',      label:'Void',      color:'#9070b8', fill:'#1a1028', vfx:3, w:10  },
  { id:'Eclipse',   label:'Eclipse',   color:'#504060', fill:'#201830', vfx:3, w:8   },
  { id:'Radiant',   label:'Radiant',   color:'#c8a040', fill:'#e0b840', vfx:3, w:6   },
  { id:'Plague',    label:'Plague',    color:'#608040', fill:'#304020', vfx:3, w:8   },
  { id:'Rune',      label:'Rune',      color:'#9060c0', fill:'#180c30', vfx:3, w:6   },
  { id:'Mirage',    label:'Mirage',    color:'#c0a070', fill:'#d4b880', vfx:3, w:5   },
  { id:'Aqua',      label:'Aqua',      color:'#30b0d0', fill:'#1888b0', vfx:3, w:4   },
  { id:'Inferno',   label:'Inferno',   color:'#d05030', fill:'#c03010', vfx:4, w:3   },
  { id:'Gilded',    label:'Gilded',    color:'#b8982a', fill:'#d4b030', vfx:4, w:2   },
  { id:'Phoenix',   label:'Phoenix',   color:'#e06010', fill:'#ff8020', vfx:4, w:3   },
  { id:'Abyssal',   label:'Abyssal',   color:'#303060', fill:'#080820', vfx:4, w:2   },
  { id:'Spectral',  label:'Spectral',  color:'#a040d0', fill:'#c060f0', vfx:5, w:1   },
  { id:'Divine',    label:'Divine',    color:'#f0e8a0', fill:'#fffce0', vfx:5, w:1   },
  { id:'Arcane',    label:'Arcane',    color:'#a030e0', fill:'#4010a0', vfx:5, w:1   },
  { id:'Cosmic',    label:'Cosmic',    color:'#4060c0', fill:'#2030a0', vfx:6, w:1   },
  { id:'Celestial', label:'Celestial', color:'#c0d8ff', fill:'#e8f0ff', vfx:6, w:1   },
];

// Size modifiers — rolled as a third independent dimension
const SIZE_MODS = [
  { id:null,    label:null,    scale:1.0,  color:'var(--ink)', w:320 },
  { id:'Small', label:'Small', scale:0.68, color:'#8090a8',    w:18  },
  { id:'Big',   label:'Big',   scale:1.35, color:'#9090c0',    w:10  },
  { id:'Giant', label:'Giant', scale:1.65, color:'#a870d0',    w:5   },
  { id:'Huge',  label:'Huge',  scale:1.95, color:'#d040e0',    w:2   },
];

// Combined score — factors shape × effect × size probability
function rarityScore(shapeId, effectId, sizeId=null) {
  const s=SHAPES.find(x=>x.id===shapeId);
  const e=EFFECTS.find(x=>x.id===effectId);
  const sz=SIZE_MODS.find(x=>x.id===sizeId)||SIZE_MODS[0];
  const totalS=SHAPES.reduce((a,x)=>a+x.w,0);
  const totalE=EFFECTS.reduce((a,x)=>a+x.w,0);
  const totalSZ=SIZE_MODS.reduce((a,x)=>a+x.w,0);
  const p=(s.w/totalS)*(e.w/totalE)*(sz.w/totalSZ);
  return -Math.log2(p);
}
function rarityLabel(score) {
  if(score>=15.9) return '✧ Mythic';
  if(score>=14.5) return '★ Legendary';
  if(score>=13.0) return '✦ Epic';
  if(score>=11.5) return '◈ Rare';
  if(score>=10.0) return '· Uncommon';
  return '— Common';
}
function rarityOdds(shapeId, effectId, sizeId=null) {
  const s=SHAPES.find(x=>x.id===shapeId);
  const e=EFFECTS.find(x=>x.id===effectId);
  const sz=SIZE_MODS.find(x=>x.id===sizeId)||SIZE_MODS[0];
  const totalS=SHAPES.reduce((a,x)=>a+x.w,0);
  const totalE=EFFECTS.reduce((a,x)=>a+x.w,0);
  const totalSZ=SIZE_MODS.reduce((a,x)=>a+x.w,0);
  const p=(s.w/totalS)*(e.w/totalE)*(sz.w/totalSZ);
  const n=Math.round(1/p);
  if(n>=10000) return `1/${(n/1000).toFixed(0)}k`;
  if(n>=1000)  return `1/${(n/1000).toFixed(1)}k`;
  return `1/${n}`;
}
function pts(score) { return Math.round(5 + score*60 + Math.random()*40); }
function isCutscene(effect) { return effect.vfx>=6; }
// Also trigger cutscene for inferno/spectral on very rare shapes
function needsCutscene(shape, effect, size=null) {
  const score=rarityScore(shape.id,effect.id,size?size.id:null);
  return effect.vfx>=6 || (effect.vfx>=4 && score>=16.5);
}

function polyPts(cx,cy,r,n,rot=0){
  return Array.from({length:n},(_,i)=>{
    const a=(i/n)*Math.PI*2-Math.PI/2+rot;
    return `${(cx+Math.cos(a)*r).toFixed(2)},${(cy+Math.sin(a)*r).toFixed(2)}`;
  }).join(' ');
}
function starPts(cx,cy,ro,ri,n){
  return Array.from({length:n*2},(_,i)=>{
    const r=i%2===0?ro:ri;
    const a=(i/(n*2))*Math.PI*2-Math.PI/2;
    return `${(cx+Math.cos(a)*r).toFixed(2)},${(cy+Math.sin(a)*r).toFixed(2)}`;
  }).join(' ');
}

function shapeGeometry(shapeId, fill, filter='') {
  const s=SHAPES.find(x=>x.id===shapeId);
  if(shapeId==='sphere')    return `<circle cx="70" cy="70" r="60" fill="${fill}" ${filter}/>`;
  if(shapeId==='star')      return `<polygon points="${starPts(70,70,60,26,6)}" fill="${fill}" ${filter}/>`;
  if(shapeId==='starburst') return `<polygon points="${starPts(70,70,60,34,8)}" fill="${fill}" ${filter}/>`;
  if(shapeId==='diamond')   return `<polygon points="70,8 125,70 70,132 15,70" fill="${fill}" ${filter}/>`;

  if(shapeId==='cross')     return `<path d="M46,10 H94 V46 H130 V94 H94 V130 H46 V94 H10 V46 H46 Z" fill="${fill}" ${filter}/>`;
  if(shapeId==='arrow')     return `<path d="M70,8 L130,70 L96,70 L96,132 L44,132 L44,70 L10,70 Z" fill="${fill}" ${filter}/>`;
  if(shapeId==='teardrop')  return `<path d="M70,12 C48,24 18,52 18,78 A52,44 0 0,0 122,78 C122,52 92,24 70,12 Z" fill="${fill}" ${filter}/>`;
  if(shapeId==='crescent')  return `<path d="M70,10 A60,60 0 1,0 70,130 A40,55 0 1,1 70,10 Z" fill="${fill}" ${filter}/>`;
  if(shapeId==='gem')       return `<polygon points="70,8 108,28 122,70 108,112 70,132 32,112 18,70 32,28" fill="${fill}" ${filter}/>`;
  if(shapeId==='ring')      return `<path fill-rule="evenodd" d="M70,14 A56,56 0 1,1 70,126 A56,56 0 1,1 70,14 Z M70,38 A32,32 0 1,0 70,102 A32,32 0 1,0 70,38 Z" fill="${fill}" ${filter}/>`;
  return `<polygon points="${polyPts(70,70,60,s.sides)}" fill="${fill}" ${filter}/>`;
}

// AUDIO ENGINE (Web Audio API)
// ═══════════════════════════════════════════════
let audioCtx=null;
function getAudio(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq,type,duration,volume,delay=0,decay=null){
  const ac=getAudio();
  const osc=ac.createOscillator();
  const gain=ac.createGain();
  osc.connect(gain);gain.connect(ac.destination);
  osc.type=type;osc.frequency.setValueAtTime(freq,ac.currentTime+delay);
  gain.gain.setValueAtTime(0,ac.currentTime+delay);
  gain.gain.linearRampToValueAtTime(volume,ac.currentTime+delay+0.01);
  gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+delay+(decay||duration));
  osc.start(ac.currentTime+delay);
  osc.stop(ac.currentTime+delay+duration+0.05);
}

function playNoise(duration,volume,hipass=200,delay=0){
  const ac=getAudio();
  const buf=ac.createBuffer(1,ac.sampleRate*duration,ac.sampleRate);
  const data=buf.getChannelData(0);
  for(let i=0;i<data.length;i++) data[i]=(Math.random()*2-1);
  const src=ac.createBufferSource();src.buffer=buf;
  const filter=ac.createBiquadFilter();filter.type='highpass';filter.frequency.value=hipass;
  const gain=ac.createGain();
  src.connect(filter);filter.connect(gain);gain.connect(ac.destination);
  gain.gain.setValueAtTime(volume,ac.currentTime+delay);
  gain.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+delay+duration);
  src.start(ac.currentTime+delay);src.stop(ac.currentTime+delay+duration+0.05);
}

function playSound(vfx, effectId){
  try {
    if(vfx===0){
      // Common: soft thud
      playTone(120,'sine',.15,.12);
      playNoise(.08,.04,800);
    } else if(vfx===1){
      // Shadow: muted thud + dark swoosh
      playTone(90,'sine',.2,.15);
      playTone(55,'triangle',.3,.1,0.02);
      playNoise(.12,.06,400);
    } else if(vfx===2){
      // tier-2 effects
      if(effectId==='Storm'){
        // rumble + crack
        playNoise(.12,.18,80);
        playTone(55,'sine',.35,.2,.02);playTone(80,'triangle',.25,.1,.05);
        playNoise(.06,.25,4000,.08);
        playTone(220,'sine',.15,.06,.12);
      } else if(effectId==='Frozen'){
        playTone(1200,'sine',.5,.08);playTone(1600,'sine',.4,.06,.05);playTone(2000,'sine',.3,.04,.1);
        playNoise(.08,.03,3000,.02);
      } else if(effectId==='Toxic'){
        playTone(400,'sawtooth',.15,.06);playTone(600,'sine',.3,.08,.05);
        playNoise(.1,.04,600);
      } else {
        playTone(880,'sine',.4,.1);playTone(1100,'sine',.35,.08,.06);playTone(1320,'sine',.3,.06,.12);
      }
    } else if(vfx===3){
      // Void/Radiant/Eclipse: deep whomp + chime
      playTone(60,'sine',.4,.25);playTone(80,'triangle',.5,.15,.05);
      playTone(660,'sine',.5,.1,.1);playTone(880,'sine',.4,.08,.18);
      playNoise(.15,.08,200,.05);
    } else if(vfx===4){
      if(effectId==='Abyssal'){
        // ominous deep drone
        playTone(40,'sine',.8,.3);playTone(55,'sine',.7,.2,.05);
        playTone(80,'triangle',.6,.15,.1);
        playNoise(.15,.08,60,.08);
        playTone(220,'sine',.4,.05,.3,1.2);
      } else {
        // Inferno/Gilded/Phoenix: explosion + cascade
        playNoise(.08,.3,100);
        playTone(80,'sawtooth',.5,.2,.02);playTone(120,'sine',.4,.15,.04);
        [440,550,660,880].forEach((f,i)=>playTone(f,'sine',.5,.1,.08+i*.06));
        playNoise(.2,.1,2000,.1);
      }
    } else if(vfx>=5){
      // Spectral/Cosmic: full fanfare
      playNoise(.06,.4,80);
      playTone(60,'sine',.6,.3,.02);
      [220,330,440,550,660,880,1100].forEach((f,i)=>playTone(f,'sine',.8,.15,.04+i*.04));
      playNoise(.3,.15,3000,.2);
      playTone(1760,'sine',.6,.1,.4);playTone(2200,'sine',.5,.08,.5);
    }
  } catch(e){}
}

function wPick(arr){const t=arr.reduce((s,x)=>s+x.w,0);let r=Math.random()*t;for(const x of arr){r-=x.w;if(r<=0)return x;}return arr[0];}
function roll(){return{shape:wPick(SHAPES),effect:wPick(EFFECTS),size:wPick(SIZE_MODS)};}

const vfxCanvas=document.getElementById('vfx');
const ctx=vfxCanvas.getContext('2d');
let particles=[],rafId=null;
function resize(){vfxCanvas.width=innerWidth;vfxCanvas.height=innerHeight;}
resize();window.addEventListener('resize',resize);

function hex2rgb(hex){const n=parseInt(hex.replace('#',''),16);return[(n>>16)&255,(n>>8)&255,n&255];}

function getShapeCenter(){const r=document.getElementById('shapeSvg').getBoundingClientRect();return{x:r.left+r.width/2,y:r.top+r.height/2};}

function spawnVFX(tier,color){
  if(tier===0||tier>=6) return;
  if(rafId) cancelAnimationFrame(rafId);
  particles=[];
  const{x:cx,y:cy}=getShapeCenter();
  const[r,g,b]=hex2rgb(color);
  const cols=[color,`rgb(${Math.min(255,r+60)},${Math.min(255,g+60)},${Math.min(255,b+60)})`,`rgb(${Math.min(255,r+120)},${Math.min(255,g+100)},${Math.min(255,b+80)})`, '#ffffff'];

  if(tier>=1){
    for(let i=0;i<18;i++){const a=Math.random()*Math.PI*2,sp=.8+Math.random()*1.5;particles.push({type:'dot',x:cx+(Math.random()-.5)*30,y:cy+(Math.random()-.5)*30,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:1.5+Math.random()*2,color:cols[Math.floor(Math.random()*2)],alpha:1,decay:.022,delay:0});}
  }
  if(tier>=2){
    particles.push({type:'ring',x:cx,y:cy,r:20,dr:8,lw:2,color,alpha:.9,decay:.022});
    for(let i=0;i<30;i++){const a=(i/30)*Math.PI*2+Math.random()*.3,sp=3+Math.random()*4;particles.push({type:'spark',x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,len:14+Math.random()*18,color:cols[i%3],alpha:1,decay:.02,delay:Math.floor(i/6)});}
    for(let i=0;i<25;i++){const a=Math.random()*Math.PI*2,sp=.5+Math.random()*2;particles.push({type:'dot',x:cx+(Math.random()-.5)*50,y:cy+(Math.random()-.5)*50,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-.8,r:1.5+Math.random()*2,color:cols[Math.floor(Math.random()*4)],alpha:.9,decay:.012,delay:Math.floor(Math.random()*8)});}
  }
  if(tier>=3){
    [0,8,18].forEach((delay,i)=>particles.push({type:'ring',x:cx,y:cy,r:15+i*8,dr:8-i,lw:2.5-i*.4,color:cols[i%3],alpha:1,decay:.016,delay}));
    for(let i=0;i<24;i++){const a=(i/24)*Math.PI*2,sp=8+Math.random()*5;particles.push({type:'spark',x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,len:32+Math.random()*32,color:cols[i%4],alpha:1,decay:.013,delay:Math.floor(i/4)});}
    for(let i=0;i<40;i++){const a=Math.random()*Math.PI*2,sp=1.5+Math.random()*4;particles.push({type:'shard',x:cx+(Math.random()-.5)*40,y:cy+(Math.random()-.5)*40,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,size:3+Math.random()*5,rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.15,color:cols[Math.floor(Math.random()*4)],alpha:1,decay:.008,delay:Math.floor(Math.random()*12)});}
  }
  if(tier>=4){
    [0,5,12,22].forEach((delay,i)=>particles.push({type:'ring',x:cx,y:cy,r:10,dr:14-i*1.5,lw:3.5-i*.5,color:[color,'#ff8040','#ffcc40','#ffffff'][i],alpha:1,decay:.012,delay}));
    for(let i=0;i<55;i++){const a=(i/55)*Math.PI*2+Math.random()*.2,sp=7+Math.random()*9;particles.push({type:'spark',x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,len:28+Math.random()*44,color:cols[i%4],alpha:1,decay:.01,delay:Math.floor(i/8)});}
    for(let i=0;i<60;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*7;particles.push({type:'shard',x:cx+(Math.random()-.5)*60,y:cy+(Math.random()-.5)*60,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-3,size:2+Math.random()*8,rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.2,color:cols[Math.floor(Math.random()*4)],alpha:1,decay:.007,delay:Math.floor(Math.random()*15)});}
    for(let i=0;i<35;i++) particles.push({type:'dot',x:cx+(Math.random()-.5)*80,y:cy+(Math.random()-.5)*40,vx:(Math.random()-.5)*.8,vy:-1.5-Math.random()*2.5,r:1.5+Math.random()*2.5,color:['#ff8020','#ffaa40','#ffee80','#ffffff'][Math.floor(Math.random()*4)],alpha:1,decay:.006,delay:Math.floor(Math.random()*20)});
  }
  if(tier>=5){
    const rc=['#e060ff','#6090ff','#40ffcc','#c0ff40','#ff8040','#ff40a0','#ffffff'];
    [0,4,10,18,28,42].forEach((delay,i)=>particles.push({type:'ring',x:cx,y:cy,r:8,dr:18-i,lw:4-i*.4,color:rc[i%rc.length],alpha:1,decay:.009,delay}));
    for(let i=0;i<80;i++){const a=(i/80)*Math.PI*2+Math.random()*.15,sp=10+Math.random()*13;particles.push({type:'spark',x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,len:38+Math.random()*58,color:rc[i%rc.length],alpha:1,decay:.008,delay:Math.floor(i/10)});}
    for(let i=0;i<90;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*9;particles.push({type:'shard',x:cx+(Math.random()-.5)*80,y:cy+(Math.random()-.5)*80,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2.5,size:2+Math.random()*10,rot:Math.random()*Math.PI*2,rotV:(Math.random()-.5)*.22,color:rc[Math.floor(Math.random()*rc.length)],alpha:1,decay:.005,delay:Math.floor(Math.random()*18)});}
    for(let i=0;i<60;i++) particles.push({type:'dot',x:cx+(Math.random()-.5)*120,y:cy+(Math.random()-.5)*60,vx:(Math.random()-.5)*2,vy:-1-Math.random()*3,r:2+Math.random()*4.5,color:rc[Math.floor(Math.random()*rc.length)],alpha:1,decay:.005,delay:Math.floor(Math.random()*25)});
    [[0,0],[innerWidth,0],[0,innerHeight],[innerWidth,innerHeight]].forEach(([sx,sy])=>{
      for(let i=0;i<8;i++){const toX=cx+(Math.random()-.5)*120,toY=cy+(Math.random()-.5)*120;particles.push({type:'spark',x:sx,y:sy,vx:(toX-sx)/28,vy:(toY-sy)/28,len:55+Math.random()*35,color:rc[i%rc.length],alpha:.8,decay:.012,delay:Math.floor(Math.random()*22)});}
    });
  }

  function draw(){
    ctx.clearRect(0,0,vfxCanvas.width,vfxCanvas.height);
    let alive=false;
    for(const p of particles){
      if((p.delay||0)>0){p.delay--;alive=true;continue;}
      if(p.alpha<=0) continue;
      alive=true;ctx.globalAlpha=Math.max(0,p.alpha);
      if(p.type==='dot'){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.fill();p.x+=p.vx;p.y+=p.vy;p.vx*=.97;p.vy*=.97;p.alpha-=p.decay;}
      else if(p.type==='spark'){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x-p.vx*(p.len/7),p.y-p.vy*(p.len/7));ctx.strokeStyle=p.color;ctx.lineWidth=1.8;ctx.stroke();p.x+=p.vx;p.y+=p.vy;p.vx*=.93;p.vy*=.93;p.alpha-=p.decay;}
      else if(p.type==='shard'){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.color;ctx.fillRect(-p.size/2,-p.size/3,p.size,p.size*.65);ctx.restore();p.x+=p.vx;p.y+=p.vy;p.vy-=.05;p.rot+=p.rotV;p.alpha-=p.decay;}
      else if(p.type==='ring'){if(p.r>0){ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.strokeStyle=p.color;ctx.lineWidth=p.lw;ctx.stroke();}p.r+=p.dr;p.dr*=.96;p.alpha-=p.decay;}
    }
    ctx.globalAlpha=1;
    if(alive) rafId=requestAnimationFrame(draw);
    else ctx.clearRect(0,0,vfxCanvas.width,vfxCanvas.height);
  }
  draw();
}

const csEl=document.getElementById('cutscene');
const csCanvas=document.getElementById('csCanvas');
const cs=csCanvas.getContext('2d');
let csRaf=null;

function resizeCS(){csCanvas.width=innerWidth;csCanvas.height=innerHeight;}
resizeCS();window.addEventListener('resize',resizeCS);

function runCutscene(shape, effect, size, onDone){
  csEl.classList.add('active');
  document.getElementById('csTitle').style.color=effect.color;
  const sizePrefix=size&&size.id?size.label+' ':'';
  document.getElementById('csTitle').textContent=effect.label?`${sizePrefix}${effect.label} ${shape.label}`:`${sizePrefix}${shape.label}`;
  document.getElementById('csSub').textContent=rarityLabel(rarityScore(shape.id,effect.id,size?size.id:null));
  document.getElementById('csSub').style.color=effect.color;

  const W=innerWidth,H=innerHeight;
  const cxcs=W/2,cycs=H/2;
  let frame=0;
  const FRAMES=(effect.id==='Cosmic'||effect.id==='Celestial')?220:180;
  const csParticles=[];

  if(csRaf) cancelAnimationFrame(csRaf);

  function initCS(){
    if(effect.id==='Inferno'||effect.id==='Gilded'){
      // Fire blast from center
      for(let i=0;i<120;i++){
        const a=Math.random()*Math.PI*2,sp=3+Math.random()*18;
        csParticles.push({x:cxcs,y:cycs,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:2+Math.random()*6,

          alpha:1,decay:.008+Math.random()*.006,delay:Math.floor(Math.random()*20)});
      }
      for(let i=0;i<8;i++) csParticles.push({type:'ring',x:cxcs,y:cycs,r:5,dr:10+i*2,lw:3,color:['#ff6020','#ffcc40','#ffffff'][i%3],alpha:1,decay:.012,delay:i*8});
    } else if(effect.id==='Spectral'||effect.id==='Cosmic'){
      const rc=effect.id==='Cosmic'?['#6080ff','#4060d0','#a0b0ff','#ffffff','#8090ff']:['#e060ff','#6090ff','#40ffcc','#c0ff40','#ff8040','#ff40a0','#ffffff'];
      for(let i=0;i<160;i++){
        const a=Math.random()*Math.PI*2,sp=4+Math.random()*16;
        csParticles.push({x:cxcs,y:cycs,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:1.5+Math.random()*5,
          color:rc[Math.floor(Math.random()*rc.length)],alpha:1,decay:.006+Math.random()*.005,delay:Math.floor(Math.random()*30)});
      }
      for(let i=0;i<12;i++) csParticles.push({type:'ring',x:cxcs,y:cycs,r:5,dr:14+i,lw:2.5,color:rc[i%rc.length],alpha:1,decay:.01,delay:i*6});
    } else if(effect.id==='Void'||effect.id==='Eclipse'){
      for(let i=0;i<100;i++){
        const a=Math.random()*Math.PI*2,sp=2+Math.random()*12;
        csParticles.push({x:cxcs,y:cycs,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:2+Math.random()*4,
          color:effect.id==='Eclipse'?['#f0a020','#ffcc40','#fff0c0','#ffffff'][Math.floor(Math.random()*4)]:['#9060d0','#c090ff','#6030a0','#ffffff'][Math.floor(Math.random()*4)],
          alpha:1,decay:.009,delay:Math.floor(Math.random()*15)});
      }
      for(let i=0;i<6;i++) csParticles.push({type:'ring',x:cxcs,y:cycs,r:5,dr:8+i*2,lw:2,color:effect.id==='Eclipse'?'#f0a020':'#9060d0',alpha:1,decay:.014,delay:i*10});
    } else if(effect.id==='Phoenix'){
      const rc=['#fff080','#ff9020','#ff5010','#ffcc40','#ff8020','#ffff90','#ffffff'];
      for(let i=0;i<140;i++){const a=Math.random()*Math.PI*2,sp=4+Math.random()*18;csParticles.push({x:cxcs,y:cycs,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:2+Math.random()*6,color:rc[Math.floor(Math.random()*rc.length)],alpha:1,decay:.007+Math.random()*.006,delay:Math.floor(Math.random()*25)});}
      for(let i=0;i<10;i++) csParticles.push({type:'ring',x:cxcs,y:cycs,r:5,dr:12+i*2,lw:3,color:rc[i%rc.length],alpha:1,decay:.011,delay:i*7});
    } else if(effect.id==='Abyssal'){
      const rc=['#2020d0','#3030a0','#0000ff','#101080','#4040ff','#080840'];
      for(let i=0;i<110;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*14;csParticles.push({x:cxcs,y:cycs,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:2+Math.random()*5,color:rc[Math.floor(Math.random()*rc.length)],alpha:1,decay:.008+Math.random()*.005,delay:Math.floor(Math.random()*20)});}
      for(let i=0;i<7;i++) csParticles.push({type:'ring',x:cxcs,y:cycs,r:5,dr:9+i*2,lw:2.5,color:rc[i%rc.length],alpha:1,decay:.013,delay:i*12});
    } else if(effect.id==='Divine'){
      const rc=['#ffffff','#fffce0','#fff8a0','#ffe860','#ffff80','#fffcd0'];
      for(let i=0;i<150;i++){const a=Math.random()*Math.PI*2,sp=4+Math.random()*20;csParticles.push({x:cxcs,y:cycs,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:1.5+Math.random()*6,color:rc[Math.floor(Math.random()*rc.length)],alpha:1,decay:.006+Math.random()*.005,delay:Math.floor(Math.random()*28)});}
      for(let i=0;i<14;i++) csParticles.push({type:'ring',x:cxcs,y:cycs,r:5,dr:16+i,lw:2.5,color:rc[i%rc.length],alpha:1,decay:.009,delay:i*5});
    } else if(effect.id==='Arcane'){
      const rc=['#e060ff','#a030e0','#ff80ff','#c040ff','#8020d0','#ff40ff','#ffffff'];
      for(let i=0;i<150;i++){const a=Math.random()*Math.PI*2,sp=4+Math.random()*17;csParticles.push({x:cxcs,y:cycs,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:1.5+Math.random()*5,color:rc[Math.floor(Math.random()*rc.length)],alpha:1,decay:.007+Math.random()*.005,delay:Math.floor(Math.random()*26)});}
      for(let i=0;i<11;i++) csParticles.push({type:'ring',x:cxcs,y:cycs,r:5,dr:14+i,lw:2.5,color:rc[i%rc.length],alpha:1,decay:.010,delay:i*6});
    } else if(effect.id==='Celestial'){
      const rc=['#ffffff','#d0e8ff','#c0d8ff','#a0c0ff','#e8f0ff','#8090d0','#f0f8ff'];
      for(let i=0;i<170;i++){const a=Math.random()*Math.PI*2,sp=5+Math.random()*18;csParticles.push({x:cxcs,y:cycs,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:1.5+Math.random()*6,color:rc[Math.floor(Math.random()*rc.length)],alpha:1,decay:.005+Math.random()*.005,delay:Math.floor(Math.random()*30)});}
      for(let i=0;i<14;i++) csParticles.push({type:'ring',x:cxcs,y:cycs,r:5,dr:17+i,lw:2.8,color:rc[i%rc.length],alpha:1,decay:.008,delay:i*5});
    } else {
      // Generic big burst
      for(let i=0;i<100;i++){const a=Math.random()*Math.PI*2,sp=3+Math.random()*14;csParticles.push({x:cxcs,y:cycs,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:2+Math.random()*5,color:effect.color,alpha:1,decay:.009,delay:Math.floor(Math.random()*15)});}
    }
  }
  initCS();

  // bg color for cutscene
  const bgColors={Inferno:'#1a0800',Gilded:'#1a1400',Spectral:'#0a0014',Cosmic:'#02040e',Void:'#080010',Eclipse:'#0e0800',
    Phoenix:'#1a0400',Abyssal:'#010108',Divine:'#1a1800',Arcane:'#0a0018',Celestial:'#020614'};
  const bg=bgColors[effect.id]||'#08080e';

  function drawCS(){
    const progress=frame/FRAMES;
    const fadeIn=Math.min(1,frame/20);
    const fadeOut=frame>FRAMES-30?1-(frame-(FRAMES-30))/30:1;
    const opacity=fadeIn*fadeOut;

    cs.clearRect(0,0,W,H);
    cs.globalAlpha=opacity;
    cs.fillStyle=bg;cs.fillRect(0,0,W,H);

    // particles
    cs.globalAlpha=opacity;
    for(const p of csParticles){
      if((p.delay||0)>0){p.delay--;continue;}
      if(p.alpha<=0) continue;
      cs.globalAlpha=Math.max(0,p.alpha)*opacity;
      if(p.type==='ring'){
        if(p.r>0){cs.beginPath();cs.arc(p.x,p.y,p.r,0,Math.PI*2);cs.strokeStyle=p.color;cs.lineWidth=p.lw;cs.stroke();}
        p.r+=p.dr;p.dr*=.97;p.alpha-=p.decay;
      } else {
        cs.beginPath();cs.arc(p.x,p.y,p.r,0,Math.PI*2);cs.fillStyle=p.color;cs.fill();
        p.x+=p.vx;p.y+=p.vy;p.vx*=.96;p.vy*=.96;p.alpha-=p.decay;
      }
    }
    cs.globalAlpha=1;

    frame++;
    if(frame<FRAMES) csRaf=requestAnimationFrame(drawCS);
    else {
      cs.clearRect(0,0,W,H);
      csEl.classList.remove('active');
      setTimeout(onDone,100);
    }
  }
  drawCS();
}

let coinCount=parseInt(localStorage.getItem('sq_coins')||'4820'),castLocked=false,lockTimer=null;
const LOCK_MS=[0,0,1800,3200,5000,7000,10000];

function setCastLock(tier){
  if(tier<=1){castLocked=false;updateCastBtn(false);return;}
  castLocked=true;updateCastBtn(true);
  if(lockTimer) clearTimeout(lockTimer);
  lockTimer=setTimeout(()=>{castLocked=false;updateCastBtn(false);},LOCK_MS[Math.min(tier,6)]||2000);
}
function updateCastBtn(locked){
  const btn=document.getElementById('castBtn'),lbl=document.getElementById('castLbl');
  btn.style.opacity=locked?'.35':'1';

}

function renderShape(shape,effect,size=null){
  const sizeScale=size?size.scale:1.0;
  const svg=document.getElementById('shapeSvg');
  svg.innerHTML=buildSVG(shape.id,effect,sizeScale);
  svg.classList.remove('popped');void svg.offsetWidth;svg.classList.add('popped');

  const bg=document.getElementById('bgGlow');
  if(effect.vfx>0){
    const spread=[0,180,260,320,400,500,600][Math.min(effect.vfx,6)];
    const opacity=[0,.18,.28,.38,.5,.65,.8][Math.min(effect.vfx,6)];
    bg.style.background=`radial-gradient(circle, ${effect.fill}ee 0%, ${effect.fill}44 40%, transparent 70%)`;
    bg.style.opacity=opacity;bg.style.width=bg.style.height=spread+'px';
    bg.style.inset=`-${(spread-240)/2}px`;
    bg.style.animation=`bgpulse ${Math.max(1.5,3.5-effect.vfx*.3)}s ease-in-out infinite`;
  } else {
    bg.style.opacity='0';bg.style.animation='none';
  }

  const score=rarityScore(shape.id,effect.id,size?size.id:null);
  const ptsVal=pts(score);
  document.getElementById('rarityTag').textContent=rarityLabel(score);

  const sizeEl=document.getElementById('sizeWord');
  if(size&&size.id){
    sizeEl.textContent=size.label+' ';
    sizeEl.style.color=size.color;
    sizeEl.style.display='';
  } else {
    sizeEl.style.display='none';
  }
  document.getElementById('effectWord').style.color=effect.color;
  if(effect.id){
    document.getElementById('effectWord').textContent=effect.label;
    document.getElementById('effectWord').style.display='';
    document.getElementById('shapeWord').textContent=' '+shape.label;
  } else {
    document.getElementById('effectWord').style.display='none';
    document.getElementById('shapeWord').textContent=shape.label;
  }
  document.getElementById('shapePts').textContent=`+${ptsVal} pts · +${Math.round(ptsVal*.75)} xp`;
  const lbl=document.getElementById('shapeLabel');
  lbl.classList.remove('popped');void lbl.offsetWidth;lbl.classList.add('popped');
  coinCount+=ptsVal;
  document.getElementById('coins').textContent=coinCount.toLocaleString();
  localStorage.setItem('sq_coins', coinCount);
  addXP(Math.round(ptsVal*.75));
  recordRoll(shape,effect,ptsVal,size);
  spawnVFX(effect.vfx,effect.color);
}

let casting=false;
function docast(){
  if(castLocked||casting) return;
  casting=true;
  const{shape,effect,size}=roll();
  const isCommon=effect.vfx<=1;
  const doRender=()=>{
    if(needsCutscene(shape,effect,size)){
      playSound(effect.vfx,effect.id);
      runCutscene(shape,effect,size,()=>{
        renderShape(shape,effect,size);
        casting=false;
      });
    } else {
      renderShape(shape,effect,size);
      playSound(effect.vfx,effect.id);
      casting=false;
    }
  };
  const f=document.getElementById('flash');
  f.className='flash'+(effect.vfx>=6?' spectral':effect.vfx>=5?' spectral':effect.id==='Divine'?' gold':effect.vfx>=4?' gold':effect.id==='Void'||effect.id==='Eclipse'||effect.id==='Abyssal'||effect.id==='Rune'||effect.id==='Plague'?' void-flash':'');
  f.classList.add('on');
  setTimeout(()=>f.classList.remove('on'),isCommon?60:effect.vfx>=4?150:80);
  setTimeout(doRender,isCommon?40:effect.vfx>=4?120:75);
}

let playerLevel = parseInt(localStorage.getItem('sq_level')||'1');
let playerXP = parseInt(localStorage.getItem('sq_xp')||'0');

function xpForLevel(lv) { return lv * 120; }

function addXP(amount) {
  playerXP += amount;
  while(playerXP >= xpForLevel(playerLevel)) {
    playerXP -= xpForLevel(playerLevel);
    playerLevel++;
    localStorage.setItem('sq_level', playerLevel);
  }
  localStorage.setItem('sq_xp', playerXP);
  updateLevelDisplay();
}

function updateLevelDisplay() {
  document.querySelector('.corner-stat .val').textContent = playerLevel;
  const pct = (playerXP / xpForLevel(playerLevel)) * 100;
  document.querySelector('.xp-fill').style.width = pct + '%';
}


// key: "shapeId|effectId"  value: { shape, effect, count, bestPts, score }
const collection = {};

function recordRoll(shape, effect, ptsVal, size=null) {
  const sid = size?size.id||'none':'none';
  const key = `${shape.id}|${effect.id||'none'}|${sid}`;
  if(collection[key]) {
    collection[key].count++;
    collection[key].bestPts = Math.max(collection[key].bestPts, ptsVal);
  } else {
    const sz = size||SIZE_MODS[0];
    collection[key] = { shape, effect, size:sz, count:1, bestPts:ptsVal, score:rarityScore(shape.id,effect.id,sz.id) };
  }
}

function buildCatCard(entry) {
  const { shape, effect, size, count, score } = entry;
  const card = document.createElement('div');
  card.className = 'cat-card';
  const sizePrefix = size&&size.id ? size.label+' ' : '';
  card.title = effect.id ? `${sizePrefix}${effect.label} ${shape.label}` : `${sizePrefix}${shape.label}`;

  // mini SVG — simplified, no animations, just shape + fill
  const miniSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  miniSvg.setAttribute('width','56');miniSvg.setAttribute('height','56');
  miniSvg.setAttribute('viewBox','-20 -20 180 180');
  miniSvg.style.overflow='visible';

  const fillMap={ Void:'#2a1040',Radiant:'#e0b840',Inferno:'#c03010',Spectral:'#c060f0',
    Prism:'#b8ccec',Glow:'#80c8a8',Frozen:'#90d0f0',Toxic:'#80d030',

    Phoenix:'#ff8020',Abyssal:'#0c0c20',Divine:'#fff8c0',Arcane:'#6010c0',Celestial:'#c0d0f0' };
  const fill = effect.id && fillMap[effect.id] ? fillMap[effect.id] : effect.fill;
  const sc = size ? size.scale : 1.0;
  const geo = shapeGeometry(shape.id, fill, '');
  miniSvg.innerHTML = sc!==1.0
    ? `<g transform="translate(70,70) scale(${sc}) translate(-70,-70)">${geo}</g>`
    : geo;
  card.appendChild(miniSvg);

  if(count > 1) {
    const badge = document.createElement('div');
    badge.className = 'count-badge';
    badge.textContent = `×${count}`;
    card.appendChild(badge);
  }

  card.addEventListener('click', () => openDetail(entry));
  return card;
}

function renderCatalogue() {
  const grid = document.getElementById('catGrid');
  grid.innerHTML = '';

  const entries = Object.values(collection);
  if(entries.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;color:var(--soft);font-size:.72rem;padding:60px 0">Nothing collected yet.<br>Go cast some shapes!</div>';
    document.getElementById('catCount').textContent = '0 shapes';
    return;
  }

  // group by rarity
  const byRarity = {};
  RARITY_ORDER.forEach(r => byRarity[r] = []);
  entries.forEach(e => {
    const r = rarityLabel(e.score);
    if(byRarity[r]) byRarity[r].push(e);
  });

  // sort within each rarity by score desc
  RARITY_ORDER.forEach(r => byRarity[r].sort((a,b)=>b.score-a.score));

  let totalUnique = 0;
  RARITY_ORDER.forEach(rarity => {
    const group = byRarity[rarity];
    if(!group.length) return;
    totalUnique += group.length;

    const label = document.createElement('div');
    label.className = 'cat-section';
    label.textContent = rarity;
    grid.appendChild(label);

    group.forEach(entry => grid.appendChild(buildCatCard(entry)));
  });

  const total = entries.reduce((s,e)=>s+e.count,0);
  document.getElementById('catCount').textContent = `${totalUnique} unique · ${total} total`;
}

    stage.style.opacity='1'; stage.style.pointerEvents='';
    cstat.style.opacity='1'; ccoins.style.opacity='1';
  } else if(page==='catalogue'){
    renderCatalogue();
    cat.style.display='flex'; cat.style.pointerEvents='all';
    requestAnimationFrame(()=>cat.classList.add('active'));
    stage.style.opacity='0'; stage.style.pointerEvents='none';
    cstat.style.opacity='0'; ccoins.style.opacity='0';
  } else if(page==='ranks'){
    ranks.style.display='flex'; ranks.style.pointerEvents='all';
    requestAnimationFrame(()=>ranks.classList.add('active'));
    currentRanksTab='global';
    document.querySelectorAll('.ranks-tab').forEach((t,i)=>t.classList.toggle('on',i===0));
    renderGlobalTab();
    stage.style.opacity='0'; stage.style.pointerEvents='none';
    cstat.style.opacity='0'; ccoins.style.opacity='0';
  }
}

// ── init
coinCount=parseInt(localStorage.getItem('sq_coins')||'4820');
document.getElementById('coins').textContent=coinCount.toLocaleString();
updateLevelDisplay();
renderShape(SHAPES.find(s=>s.id==='sphere'),EFFECTS.find(e=>e.id==='Glow'));
</script>
</body>
