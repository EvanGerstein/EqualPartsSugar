<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Files</title>
    <style>
        :root {
            --bg: #0a0a10;
            --card: #161824;
            --text: #f2f4ff;
            --muted: #a9afc7;
            --accent: #3847a6;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 50% 15%, #1b1f31 0%, var(--bg) 55%);
            color: var(--text);
            font-family: "Trebuchet MS", "Segoe UI", Tahoma, sans-serif;
        }

        main {
            width: min(900px, 92vw);
            text-align: center;
            padding: 30px 20px 36px;
            border: 2px solid #2f3659;
            border-radius: 22px;
            background: rgba(10, 11, 18, 0.8);
            box-shadow: 0 22px 55px rgba(0, 0, 0, 0.45);
        }

        h1 {
            margin: 0;
            font-size: clamp(2.2rem, 7vw, 5rem);
            letter-spacing: 0.22em;
            text-transform: uppercase;
        }

        .countdown {
            margin-top: 24px;
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 12px;
        }

        .time-card {
            background: var(--card);
            border: 1px solid #2b3154;
            border-radius: 14px;
            padding: 14px 10px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
        }

        .value {
            font-size: clamp(2rem, 8vw, 4.5rem);
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            text-shadow: 0 0 10px rgba(110, 128, 255, 0.28);
        }

        .label {
            margin-top: 6px;
            letter-spacing: 0.13em;
            text-transform: uppercase;
            font-size: 0.72rem;
            color: var(--muted);
        }

        .done {
            font-size: clamp(1.2rem, 4vw, 2.2rem);
            font-weight: 800;
            margin-top: 24px;
        }

        @media (max-width: 620px) {
            .countdown {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
    <main>
        <h1>The Files</h1>

        <section class="countdown" id="countdown" aria-label="Countdown to reveal">
            <div class="time-card">
                <div class="value" id="days">00</div>
                <div class="label">Days</div>
            </div>
            <div class="time-card">
                <div class="value" id="hours">00</div>
                <div class="label">Hours</div>
            </div>
            <div class="time-card">
                <div class="value" id="minutes">00</div>
                <div class="label">Minutes</div>
            </div>
            <div class="time-card">
                <div class="value" id="seconds">00</div>
                <div class="label">Seconds</div>
            </div>
        </section>

        <p class="done" id="done" hidden>The Files are now open.</p>
    </main>

    <script>
        const targetTime = new Date('2027-07-07T15:00:00-05:00').getTime();

        const daysEl = document.getElementById('days');
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');
        const doneEl = document.getElementById('done');
        const countdownEl = document.getElementById('countdown');

        function pad(value) {
            return String(value).padStart(2, '0');
        }

        function updateCountdown() {
            const now = Date.now();
            const diff = targetTime - now;

            if (diff <= 0) {
                daysEl.textContent = '00';
                hoursEl.textContent = '00';
                minutesEl.textContent = '00';
                secondsEl.textContent = '00';
                countdownEl.setAttribute('aria-hidden', 'true');
                doneEl.hidden = false;
                return;
            }

            const totalSeconds = Math.floor(diff / 1000);
            const days = Math.floor(totalSeconds / 86400);
            const hours = Math.floor((totalSeconds % 86400) / 3600);
            const minutes = Math.floor((totalSeconds % 3600) / 60);
            const seconds = totalSeconds % 60;

            daysEl.textContent = pad(days);
            hoursEl.textContent = pad(hours);
            minutesEl.textContent = pad(minutes);
            secondsEl.textContent = pad(seconds);
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
